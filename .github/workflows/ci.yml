name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Strict doctor passes on official samples
        run: |
          node bin/expo-harmony.js doctor --project-root examples/official-minimal-sample --strict
          node bin/expo-harmony.js doctor --project-root examples/official-app-shell-sample --strict
          node bin/expo-harmony.js doctor --project-root examples/official-ui-stack-sample --strict

      - name: Strict doctor fails on negative fixtures
        run: |
          for fixture in fixtures/managed-app fixtures/minimal-camera-app fixtures/minimal-router-app fixtures/router-missing-plugin-app fixtures/missing-identifiers-app fixtures/ui-stack-missing-reanimated-adapter-app fixtures/ui-stack-missing-svg-adapter-app fixtures/ui-stack-missing-gesture-adapter-app fixtures/ui-stack-specifier-mismatch-app; do
            exit_code=0
            node bin/expo-harmony.js doctor --project-root "$fixture" --strict || exit_code=$?
            if [ "$exit_code" -ne 2 ]; then
              echo "Expected exit code 2 for $fixture, got $exit_code"
              exit 1
            fi
          done

      - name: Official samples init and sync remain idempotent
        run: |
          pnpm --dir examples/official-minimal-sample run harmony:init
          pnpm --dir examples/official-minimal-sample run harmony:sync-template
          pnpm --dir examples/official-minimal-sample run harmony:sync-template
          pnpm --dir examples/official-app-shell-sample run harmony:init
          pnpm --dir examples/official-app-shell-sample run harmony:sync-template
          pnpm --dir examples/official-app-shell-sample run harmony:sync-template
          pnpm --dir examples/official-ui-stack-sample run harmony:init
          pnpm --dir examples/official-ui-stack-sample run harmony:sync-template
          pnpm --dir examples/official-ui-stack-sample run harmony:sync-template

      - name: Official samples bundle
        run: |
          pnpm --dir examples/official-minimal-sample run harmony:bundle
          pnpm --dir examples/official-app-shell-sample run harmony:bundle
          pnpm --dir examples/official-ui-stack-sample run harmony:bundle
